body:
  text: 後學德潤敬録我佛慈悲大願王勸人念佛往西方娑婆界內輪回苦極樂國中壽命長七日持名心不亂六根清淨性昭彰如來直指菩提路句句明文在典章淨國土妙無窮七寶妝成極樂宮處處迦陵前鼓舞雙雙孔後林中蓮開上品難為比花吐幽香更不同一等莊嚴諸佛剎無如淨土巧玲瓏一念如如在目前聲聲佛號入心田看經解義三車物念佛栽培九品蓮體用中和皆自性消疑息慮絶攀緣持名憶念應如是寶筏常停苦海邊西方勝境妙難量入得淨心自彰八德池中蓮九品一荷花內法三章金沙布地青霞壁瑪瑙砌階白玉墻宮殿頗多難盡述專心念佛到蓮鄉到得故鄉心自彰微風吹動妙蓮香羣生盡是金剛體衆德無非智慧光行樹枝枝分赤白奇花朵朵現青黃諸君能赴蓮池會不使主人終日忙世事回頭入道場堅心念佛往西方擡頭盡是黃金殿舉眼無非白玉堂七寶瑤池敷菡萏八功德水戲鴛鴦諸君真到蓮國便請知音和一章聲聲佛號有無中只要行人信願充願力擊開彌勒閣信根自上妙高峯善財樹杪留明月龍女花邊送好風悟入蓮真實地始知淨土樂何窮一個皮包臭革囊因何貪戀不思鄉今生造下無邊罪他世循環有報償若肯回心修淨土了明法性入慈航胸中業識消除盡親見彌陀大願王有意登超極樂天卻於諸佛總無緣多生業識如流水纍劫塵勞似鐵堅能了胸中無一物何須過慮悔前愆勸君早把彌陀念免使心王被業牽多年古鏡要磨功垢盡塵消始得融靜念投於亂念裏亂心全入靜心中深深自覺歸蓮土淺淺當然照寂空全體即真無阻隔自南自北自西東禪淨何曾有二門分禪分淨莫須論禪歸淨土本同體淨入禪心即共源妙契真如成法性深機解説到祇園勸君不必爭人我念句彌陀報佛恩有説西方在目前須知淨土隔天淵休從句裏生分別要在心中脫苦纏五蘊搜空千佛土六根蕩盡四禪天彌陀佛號須常念念到無心自灑然身忘念寂漏將鎔端坐寥寥對碧峯萬法皆泯心自在一塵不染性花濃此時初入蓮境他日西歸覩玉容奉白同修諸善友蓮消息易相逢多年暗室一燈明明暗皆從心地生慧眼豁開融萬里法身未顯昧三更只因妄處塵心滯了悟通時佛性榮仗此光明歸淨土逍遙自在向西行狐疑不信失家珍自願娑婆造業因不識苦根如蔓草豈知我見似迷塵但能悔過從前事便達蓮末後津一旦心空登及第彌陀也是箇中人妄念無窮何日休只消耳聽念中求聲聲遇滯原無滯句句回流竟不流萬法掃開歸實地初心切莫學虗頭返聞自己彌陀現念到無心得自由句句彌陀搜妄空妄空即見主人翁初聲入寂聲聲寂一法參通法法通莫謂根塵容易須知妄念最難攻但憑信願行三力掃盡凡情性自融循環劫數最悲傷脫苦無如極樂場專念彌陀離此土勤持佛號入蓮鄉紅旗影裏前生業白刃叢中後世殃誓願今生歸淨土永離兵燹往西方不停起滅真生死晝夜交攻似火煎只在目前無法了如何直下永消愆但持佛號塵勞息專念彌陀妄自泯不用別求元妙訣只消一個念頭堅念聲直透未生前無用重情下水船一句彌陀常不斷六根解脫自忘年曹溪只説心無住僧肇惟談物不遷會取其中微妙旨便登九品玉池蓮生滅塵勞是夜叉因何不發菩提芽心田不長無明草性地常開智慧花一句彌陀融似鏡六門失守亂如麻勸君趁早回頭望苦海滔滔無盡涯一盞孤燈伴寂寥無憂無慮度殘宵由他送舊辭年臘莫管迎新賀歲朝句句彌陀觀自在心心佛號絶塵囂若人會得其中法彈指蓮路不遙曾學宗門不二禪而今到處有棲緣自慙淺識非僧德誰向深心伴佛眠夜聽風聲猶未息早觀瑞雪布連天此時風雪從心起因念無生境不遷淨涵居士愛參禪先結蓮淨土緣但得心空登及第何妨性法利人天因言顯理真常道得兔忘蹄月正圓話到更深時已久渾忘飲食與安眠凡事和平心地純功名富貴豈由人蛟龍非是池中物美味由來席上珍句句彌陀能化衆聲聲佛號度迷津為官清德明如鏡得意回家修淨因念句彌陀識者稀深知妙理最幽微靜中佛號融三界心裏持名絶百非信解時時觀自在行持處處見深機清光直透無生國照見彌陀伴月歸本來無證亦無修不必專心向外求憶念彌陀清徹底返聞佛號自優遊六根不動常恬靜萬法歸源盡罷休拋卻人間名利事一心頓入九蓮舟塵念清恬照色空心非內外亦非中應無所住名蓮土才有纖塵號境風莫謂淨容易到須知妄念最難窮若能放下根和識誠念彌陀性自融名醫化導有來因疾病傷寒先忌瞋脈理深微能率性良方精細度迷津清憕識透清憕法濁念生疏淨念純看破萬般皆夢幻不如念佛報雙親妄念相從時刻防急須念佛往西方舌根不作娑婆苦鼻孔常聞極樂香一句彌陀超識海六根寂靜入慈航回頭忽見清如月得意消遙歸故鄉念句彌陀道力強紛紛業識化為良若非清照寒潭月爭得塵消徹底彰但向其中修淨土莫從別處問西方一心不退行將去晝夜六時恆吉祥淨土法門與俗違莫將清月比前非虔持佛號真常道誠念彌陀妄自稀但得六根成解脫便明四相絶攀依功圓果滿如如理即是心空及第歸焚香早暮即清蓮妄念難除障現前不掃心塵皆是幻了明性地亦非仙如如竟爾忘身外寂寂時乎彼岸邊但願頓超極樂國靈光一點照心田心靜時時聞妙香何勞鼻孔去思量諸般妄念歸蓮土萬法塵緣入故鄉莫謂清池無佛性須知明月照心王一聲佛號如流水親見彌陀分外彰執持名號最相當句句彌陀是故鄉識得六根皆是幻便明四大亦非常一心念佛絶能所五眼若明徹底彰普勸同修真實念勦除六賊禮空王獨坐澄心意自舒諸緣放下樂幽居窗前明月為蓮友門外清風作伴余一句彌陀常寂寂六時佛號自如如欲知念佛真消息靜裏持名照太虗為官不礙念彌陀念得彌陀萬物和化鶴成仙民樂業擊蛇消異沐恩波分明盡是蓮旨到處無非淨土荷時至理彰勞慮息同登彼岸出娑婆智眼雖明性未開顛顛倒倒惹塵埃心中妙句如流水筆下搜尋似疾雷孟德醉歌於赤壁張松過目亦奇才二公權勢今何在遺笑後人真苦哉慧是聰明伶俐魔勸君趁早念彌陀思量作句塵勞窟卜度尋文生死窠蕩盡心中無一物搜空意內絶三多頭頭皆是蓮境請問諸君會也麼苦境分明在目前無容別處問神仙聲聲佛號離兵劫句句彌陀念向先內有清虗含性月外無塵事到心田百千魔孽歸王化念句彌陀更要堅外道波旬正念迷皆因宿世昧菩提能知性地無餘物豈礙心田入污泥方寸本離生滅法圓通安有是非稽若還節外分岐路依舊塵勞苦海棲間人無事念彌陀念徹彌陀出網羅物物施為非住著頭頭造化自相和圓光直透三摩地接引蓮一剎那得意安然歸極樂哀哉不信奈如何僧家念佛莫輕離念句彌陀知是誰悟徹心田無障礙了明性地有何為梵音演唱如如曲漢語莊嚴寂寂詞若是心遊世俗諦袈裟底下羽毛披道家修煉在丹田心向爐中分外堅要識長生真不老須知爐內絶塵煙蓬萊海島終非久極樂逍遙自在天奉勸道君宜念佛無容別處覓神仙尼師念佛要心堅富貴人家少去穿坐守空門心自在安居靜室性珠圓一聲佛號蓮近萬法皆泯極樂天生死臨頭如夢幻但憑佛力入池蓮少年念佛莫心疑一句彌陀出世基生死到來無老少是非安得有摩尼生前預辦資量費去後自然用不虧莫待臨時抱佛腳命終追悔不能為老來念佛往西方放下諸緣念要強句句彌陀須著實聲聲佛號莫思量年高好比風前燭歲邁猶如瓦上霜生死臨頭仗佛力一心不二入蓮鄉病人念佛得良方劇苦之中莫亂狂一念不生全體現六根才動即魔王時時妄想要勤掃日日彌陀不可忘念得心中諸病退花開見佛壽難量死到臨頭物外身先須識取本來人息皮囊革終非久濃血纏筋豈是真前路茫茫須念佛腳根穩穩出迷津蓮國土無生滅撒手歸西認故親愚昧之人真可哀胸中無慧業成堆前生毀謗蓮路今世朧入苦胎莫道循環無報應須知現在受愚災若能改過從前業念句彌陀業自灰癡人夢想欲封侯終日思量終日愁似麵入油分不出如蛾赴火自燒頭心田盲昧前生業性底未明不願修若肯回頭心向善念聲佛號懺愆尤苦惱衆生作業多生生世世墮沉河一身造罪無非己十殿案前也是他馬面擎叉心懼怕牛頭持戟奈如何回心念句彌陀佛彈指之間出網羅樂是衆生之苦因謹防六賊要留神一聲佛號方為道四字彌陀離垢身法體本來無苦樂真如安得有沉淪他時悟入蓮旨始信從前錯問津塵勞不起原無物怎奈衆生執著多妄落疑根如蔓草念頭動處似風波胸中未徹真空理心內常思自在窩色相欲求極樂國猶如一世作南柯行持念佛在心常可愍衆生業識忙一句彌陀才欲念六根亂動即顛狂他人國寶曾為數自己家珍不肯當如是修行空用力未知念處有靈光彌陀佛號大醫王接引迷流入故鄉念到心空登及第衆生與佛兩俱忘持名本不落思數念佛猶如明月光悟徹現前只一句無庸末後問西方行時念佛莫蹉跎念裏彌陀要磨腳踏蓮真實地心持佛號掃羣魔頭頭盡現西方境步步無非極樂荷今假信根與願力早登淨土出娑婆住時念佛莫含糊四大之中誰是吾忘念雙泯心浪靜識根才動幻風呼一塵不立原空寂萬法窮通非有無若會其中真自在親臨淨土灌醍醐坐時念佛莫貪眠句句彌陀佛現前八德池中心自在九蓮臺上性常圓坐觀無佛方云佛靜聽非仙始是仙個裏佛仙毫錯認塵勞依舊浪滔天臥時念佛最清涼呼吸之中作道場身上垢衣猶未脫胸中靜境入蓮鄉醒來一覺青天闊忘卻三更白月光奉勸諸君勤念佛同登彼岸禮心王富從祖上積陰功凡事均和意氣通世上從無千載富人間那有百年窮秦吞六國今何在漢得三齊亦是空但念彌陀歸淨土財源勝比世間融富貴娑婆安樂仙門高戶顯伴君前纍生種下菩提子今世榮華果自然怎奈凡軀終不久何如念佛入池蓮西方皆得長生體非比閻浮濁世天貧乏之人真可憐三䬸茶飯不周全家中搜盡有何粟腰內洗空無半錢前世不修現受苦今生為善後因緣只消念句彌陀佛自有充飢上品蓮下賤之人一念差今生不得好因芽書童忽忽搬柴米使女匆匆茗茶胸內但能勤念佛心中便放菩提花時時不昧彌陀號一念回光達故家入仕文章筆有神胸中機變皆前因連科登第豈能料一舉成名社稷臣平昔利開污濁水而今榮耀讀書人雖然貴顯終須盡不若持名認故親農家念佛最分明兩手持秧退步行句句彌陀常著實聲聲佛號淨因生他無性地隨風轉我有心田戴月耕歲歲資糧終有望一年四季樂和平工藝精明心最微印之於手法依依雕龍須假拿雲力刊鳳要憑釣月機諸事玲瓏隨得巧萬般伎倆幻終非不如放下塵勞業念句彌陀伴月歸商客求財意氣昂只因家計受風霜四方貿易非吾土八面堆金是遠鄉利重須防風浪險財多難免盜來傷無如勤念彌陀佛衣裏明珠自放光漁翁得利在遍舟朝夕無停下釣鉤細雨濛濛楊柳岸寒風漂漂荻蘆洲目前取利雖然好恐後閻羅不肯休三面朝天終有失不如念佛早回頭樵夫念佛更心堅句句彌陀不計年芳草落花寒雨後間雲野鶴夕陽邊巖前西方境山外青青極樂天識得其中真淨土彌陀接引入池蓮耕讀心田要向先農夫得業自安然牧童適意花邊臥水牯逍遙草上眠五穀豐登民樂業四時歌舞慶堯天大家同念彌陀佛攜手齊登般若船讀書莫向言中覓真學休從句外求魚兔得時方入道筌蹄何用覓回頭聖凡各別為多體三教同流共一舟但念彌陀歸淨土貪瞋癡愛一齊休平旦寅時念佛純行人路上要留神聲聲佛號身之寶句句彌陀出世因內裏明珠猶未透外求知識亦非真有時內外皆明徹照見彌陀轉法輪日出卯時念佛陀虔心皈命莫蹉跎一聲念寂蓮國萬法心通淨土坡處處無非彰自性頭頭盡是渡人河忽然心佛兩俱滅照見塵勞出網羅辰時念佛要低聲句句彌陀淨土萌緑水涵虗心不淺蒼苔待月性常明一塵不染人間少萬法皆空世外榮極樂花開蓮九品同登彼岸證無生巳時念佛了無生了得無生心地明卻似深潭含性月猶如空谷應虗聲裂開一味無為法演出萬般差別名莫向心中安了義須知離相要離情午時念佛日居中一句彌陀分外融須向己躬勤拭掃莫言淨土路難窮胸無妄念三乘道心有靈苗萬法通他日親臨極樂國花胎現出主人翁未時念佛日斜西行處不真染污泥心著纖毫皆是妄性無煩惱亦非迷一聲佛號蓮域四字持名淨土棲時至理彰真性現同歸極樂證菩提申時念佛莫思量才著思量妄更強三業純和常自在六根通達入蓮鄉功圓處處彌陀佛果滿頭頭大覺王念到無生心自現因風吹火性花香酉時念佛日歸山痛念己躬淚自潸心裏不明智慧淺胸中有滯妄連環塵根不輪回苦業識搜空性自還息念歸源真淨土荊山白玉本無斑戌時念佛要分明須識娑婆是火坑大限到來真黑暗閻羅不問路難行專心早把彌陀念免使臨終受苦情奉勸諸君宜早悟莫教後悔墮迷盲亥時念佛在胸堂夜靜更深思故鄉莫謂蓮容易到須知遇境即迷盲一輪皓月當空照萬點殘星徹底彰若識於中心月現無勞別處問西方子時念佛正三更妄念難明晝夜行若信深心觀自在何庸先慮障緣生一聲佛號青天外四字彌陀白月明無用別求元妙訣只消念念問歸程丑時念佛聽雞鳴句句彌陀細細評天上浮雲俱散盡空中孤月正分明無心佛性融三界有意超登昧五更早辦資糧歸淨土臨時掘井不能行立春念佛要心堅一瓣信香爐內燃日暖風和新氣象春光色比舊時鮮聲聲演唱無生曲句句提持淨土緣四字持名歸極樂何須另覓渡人船雨水風調體用和一心不亂出娑婆冰融殘雪韶光淺日暖風恬念佛陀但得心頭無我相於中幻迹亦消磨休於格外求奇特求得元機也是魔驚蟄聞雷萬物和專心念佛意云何根塵掃盡彌陀現業識拽空也是他人法雙忘名極樂凡情不起妄無多聲聲佛號真如理入聖超凡一剎那春分念佛正相宜時到其中莫遠離消盡春光柳眼綻布回暖氣放花期事猶塵纍難澄寂理到圓融非有為趁此春光尋出路莫貪塵事失摩尼清明時節雨花飛祭掃墳堂出戶扉風捲渡頭波浪險雲凝提畔哭聲稀祖先若欲生蓮界兒女虔修切莫違今日禁煙寒食節一心念佛向西歸穀雨持名似疾雷一聲佛號掃塵埃解開六結無餘結蕩盡凡胎與聖胎心到亂時須念佛事從忙處拽將回若能如是修蓮土接引靈光入玉臺立夏清和念佛忙彌陀句句自承當一年瑞氣從今去九十春光隔歲彰東土國中時有變西方蓮界壽無量始知妄念輪回苦誓願今生歸故鄉小滿持名意味長一塵不立最清涼日催炎帝由他去氣尚清和念自強心裏有塵皆是妄胸中無事亦非盲勸君早發西方願免使塵勞終日忙芒種農人處處忙彌陀一句未曾忘年豐黴雨抽苗早歲稔和風吐穗芒耕種耘田終是苦秋收冬熟聊安康娑婆歲歲皆勞力淨土時時最吉祥夏至虔誠念佛陀虎溪遠祖種蓮荷池塘蒲緑涼風少庭院榴紅熱氣多法法圓融歸淨土塵塵究竟入蓮坡如如一句彌陀佛識轉智成一剎那小暑持名心至誠時時佛號信中行日長荷淨如秋月夜短槐高似太清對境何嘗有境界遣心無處不心榮淨中念佛常安樂句句彌陀分外明大暑流金似火攻毫無暖氣到心中由他赤帝日輪午莫管金烏酷氣雄一句彌陀常自在六時佛號證圓通欲知箇裏真消息節令交秋各處同立秋念佛炎光回玉露金風時刻催月色微微三伏盡秋光暗暗一聲雷耳聞不實原非苦眼見無塵心自灰暑往寒來皆是幻了明心地入蓮胎處暑寒來道易生六時佛號更虔誠蟬聲唧唧鳥聲噪山自蒼蒼水自清時至理彰忘我見圓融解脫了凡情西方淨土名為樂但念彌陀緊步行白露持名妄又狂思來想去顯名揚須知塵幻輪回苦未識身軀不久常若向回心勤念佛何庸思慮悔前殃只消四字行將去果滿功圓歸故鄉秋分念佛莫貪眠一句彌陀信要堅心隨萬境從他變性徹三空淨土圓六門絶待常忘佛一法全真不滯禪若有纖塵掃不盡依然業識浪滔天寒露持名念至微求生淨土信依依試觀昨夜西風急即見今朝黃葉飛四面煙雲皆念佛百年身世有何違不須別處求功效單念彌陀妄自稀霜降持名萬事休光陰迅速又殘秋金風吹落梧桐葉寒月照空露地牛當體廓開天地靜靈機透脫不須求微塵剝破彌陀現始到蓮彼岸頭立冬念佛到君傍一句彌陀意味香日短清虗人事少夜長寂靜道心強家中自有蓮室物外豈無淨土場到岸請君回香望彌陀卻在性中彰小雪持名面向西寒風入口氣難提深深念句彌陀佛淺淺能歸淨土棲內有瑤池含性月外無塵事即忘蹄若人會得其中意便悟蓮月映溪大雪寒來念佛安一聲佛號一聲歡尋梅踏雪己躬事煮茗敲冰皆不難生死未明常念佛是非雖暗用心觀忽然日照蓮境便到蓮坐寶鑾冬至陽生更又寒聲聲佛號靜中安風吹葉落千山瘦雨打濃霜百草乾會得胸中真法性便明心地入空觀雖然幾句平常話勝比三車妙義翰小寒念佛兩相融細雨濛濛二九中念念圓明真性體聲聲喚醒主人公萬緣既息有何迹一點寒光照碧空此是蓮真的旨其中奧妙意難窮大寒念佛有精神一句彌陀日日新念佛佛蹤無處覓窮心心迹有何因可憐轉腦回頭漢錯認拈香抱火人若解胸中四個字明珠百八是家珍永明壽祖云有禪有淨土猶如帶角虎世之學佛者其亦禪淨雙修為無上法門乎己卯秋清玉與錢唐許靈虗共刻普能禪師彌陀經易解及淨土詩一時淨業之徒幾於家置一編人手一帙矣是年冬有乾上人復以吾師定念和尚法語見示清玉受而讀之見其言言透頂語語徹宗直指威音以前力提向上一著吾師與普公為法兄弟前後主天寧寺有年一則宏揚淨土一則廣闡宗風與壽祖有禪有淨土之旨可為深相符契矣回憶同治甲戌之冬清玉從臺灣內渡朔風怒號海濤山立輪舟顛險幸得生還甫抵吳門驚魂未定即駕小舟赴毗陵叩吾師於天寧丈室師時病已篤猶力疾起授清玉三皈五戒諄諄以佛道無上相勛勵乃未浹兩旬師竟圓寂清玉每痛與吾師法緣之淺不得常承棒喝今幸得此編時時展誦潛參默究庶幾一旦心地廓明得見本來面目與吾師於常寂光中絲毫不隔師以無言言清玉以不聞聞又何必朝提夕命方許為親炙有道也哉亟付剞劂以廣流傳師茶毗日有堅固子清玉親獲一粒供奉精舍每於萬緣退聽之時焚香趺坐觀想真身水月空明根塵俱脫師乎師乎此又豈尋常世緣之所能及者乎光緒七年七月弟子清玉稽首謹識
